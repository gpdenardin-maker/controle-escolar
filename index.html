<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Controle de Acompanhamento Escolar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#fff}
    .wrap{min-height:100vh;padding:20px}
    .container{max-width:980px;margin:0 auto}
    .card{background:#111827;padding:20px;border-radius:14px;margin-bottom:18px}
    .card-report{background:#f8fafc;color:#111827;padding:24px;border-radius:14px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
    .label{margin-bottom:6px;opacity:.85;font-size:14px}
    input,select,textarea{width:100%;padding:12px;border-radius:8px;border:none;background:#f8fafc;color:#111827;box-sizing:border-box;font-size:16px}
    textarea{min-height:90px}
    button{padding:12px 16px;border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:0.2s}
    button:active{opacity:0.7}
    .green{background:#22c55e;color:#fff}.blue{background:#3b82f6;color:#fff}.gray{background:#1f2937;color:#fff}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .block{background:#e2e8f0;padding:14px;border-radius:10px;margin-bottom:14px}
    .hidden{display:none!important}
    .rowitem,.record{background:#1f2937;padding:14px;border-radius:12px;margin-bottom:10px;word-break:break-all}
    table{width:100%;border-collapse:collapse;background:#fff;color:#000;font-size:13px}
    th,td{border:1px solid #cbd5e1;padding:8px;text-align:left}
    th{background:#e2e8f0}
    .preview{width:90px;height:90px;object-fit:cover;border-radius:12px}
    .signature{width:220px;height:100px;object-fit:contain;background:#fff;border-radius:12px;padding:8px}
    .toast {position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(34,197,94,0.95);color:white;padding:16px 24px;border-radius:12px;font-weight:bold;opacity:0;transition:0.3s;z-index:9999;pointer-events:none}
    .toast.show {opacity:1}
    @media print{body{background:#fff}.print-hide{display:none!important}}
  </style>
</head>
<body>

<div id="login" class="wrap">
  <div class="container" style="max-width:320px;margin-top:10vh;">
    <div class="card">
      <h2>Controle Escolar</h2>
      <input id="senha" type="password" placeholder="Senha de acesso" />
      <button id="entrarBtn" class="green" style="width:100%;margin-top:15px">Entrar</button>
    </div>
  </div>
</div>

<div id="app" class="wrap hidden">
  <div class="container">
    <div class="card print-hide">
      <h2>Painel de Controle</h2>
      <div class="nav">
        <button data-aba="inicio" class="navbtn gray">Home</button>
        <button data-aba="alunos" class="navbtn gray">Alunos</button>
        <button data-aba="lancamento" class="navbtn gray">Lançar Registro</button>
        <button data-aba="relatorios" class="navbtn gray">Relatórios</button>
        <button data-aba="perfil" class="navbtn gray">Meu Perfil</button>
      </div>
    </div>

    <div id="aba-inicio" class="aba hidden">
      <div class="card">
        <h3>Resumo</h3>
        <div class="grid">
          <div class="gray" style="padding:15px;border-radius:10px">Alunos: <span id="h_alunos">0</span></div>
          <div class="gray" style="padding:15px;border-radius:10px">Registros: <span id="h_regs">0</span></div>
        </div>
      </div>
    </div>

    <div id="aba-alunos" class="aba hidden">
      <div class="card">
        <h3>Cadastrar Aluno</h3>
        <div class="grid">
          <input id="a_nome" placeholder="Nome do Aluno">
          <input id="a_escola" placeholder="Escola">
          <input id="a_horario" placeholder="Horário (ex: 08:00 às 12:00)">
        </div>
        <button id="salvarAlunoBtn" class="green" style="margin-top:15px">Salvar Aluno</button>
      </div>
      <div id="listaAlunos"></div>
    </div>

    <div id="aba-lancamento" class="aba hidden">
      <div class="card">
        <h3>Novo Registro</h3>
        <div class="grid">
          <select id="l_aluno"><option value="">Selecione o Aluno</option></select>
          <input id="l_data" type="date">
          <textarea id="l_obs" placeholder="O que aconteceu hoje?"></textarea>
        </div>
        <button id="salvarLancamentoBtn" class="green" style="margin-top:15px">Salvar Atendimento</button>
      </div>
      <div id="ultimosRegistros"></div>
    </div>

    <div id="aba-relatorios" class="aba hidden">
      <div class="card print-hide">
        <h3>Gerar Relatório</h3>
        <select id="r_aluno"><option value="">Selecione o Aluno</option></select>
        <button id="imprimirBtn" class="blue" style="margin-top:10px">Imprimir/PDF</button>
      </div>
      <div class="card-report">
        <h2 align="center">RELATÓRIO ESCOLAR</h2>
        <div id="rel_corpo"></div>
        <table style="margin-top:20px">
          <thead><tr><th>Data</th><th>Observação</th></tr></thead>
          <tbody id="rel_tabela"></tbody>
        </table>
      </div>
    </div>

    <div id="aba-perfil" class="aba hidden">
      <div class="card">
        <h3>Meu Perfil (Monitora)</h3>
        <input id="m_nome" placeholder="Seu Nome">
        <input id="m_cpf" placeholder="Seu CPF" style="margin-top:10px">
        <button id="salvarPerfilBtn" class="green" style="margin-top:15px">Salvar Perfil</button>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast">Salvo com sucesso!</div>

<script>
const PASSWORD = "acesso123";
let state = { monitora: {}, alunos: [], registros: [] };

function save() { 
  localStorage.setItem("DATA_GP", JSON.stringify(state)); 
  render();
}

function load() {
  const d = localStorage.getItem("DATA_GP");
  if(d) state = JSON.parse(d);
}

function render() {
  h_alunos.textContent = state.alunos.length;
  h_regs.textContent = state.registros.length;

  // Atualiza listas de alunos
  l_aluno.innerHTML = '<option value="">Selecione o Aluno</option>';
  r_aluno.innerHTML = '<option value="">Selecione o Aluno</option>';
  listaAlunos.innerHTML = "";
  
  state.alunos.forEach(a => {
    const opt = `<option value="${a.id}">${a.nome}</option>`;
    l_aluno.innerHTML += opt;
    r_aluno.innerHTML += opt;
    listaAlunos.innerHTML += `<div class="rowitem card"><span>${a.nome}</span> <button onclick="removerAluno('${a.id}')" class="blue">Excluir</button></div>`;
  });

  // Ultimos registros
  ultimosRegistros.innerHTML = "";
  [...state.registros].reverse().slice(0,5).forEach(r => {
    const alu = state.alunos.find(x => x.id === r.alunoId);
    ultimosRegistros.innerHTML += `<div class="record"><strong>${alu?.nome}</strong> - ${r.data}<br>${r.obs}</div>`;
  });
}

// LOGIN
entrarBtn.onclick = () => {
  if(senha.value === PASSWORD) {
    login.classList.add("hidden");
    app.classList.remove("hidden");
    l_data.value = new Date().toISOString().split('T')[0];
    setAba("inicio");
  } else { alert("Senha incorreta"); }
};

// NAVEGAÇÃO
function setAba(n) {
  document.querySelectorAll(".aba").forEach(a => a.classList.add("hidden"));
  document.getElementById("aba-"+n).classList.remove("hidden");
  render();
}
document.querySelectorAll(".navbtn").forEach(b => b.onclick = () => setAba(b.dataset.aba));

// AÇÕES
salvarAlunoBtn.onclick = () => {
  if(!a_nome.value) return;
  state.alunos.push({ id: Date.now().toString(), nome: a_nome.value, escola: a_escola.value });
  a_nome.value = ""; a_escola.value = "";
  save();
  showToast();
};

function removerAluno(id) {
  state.alunos = state.alunos.filter(a => a.id !== id);
  save();
}

salvarLancamentoBtn.onclick = () => {
  if(!l_aluno.value || !l_obs.value) return alert("Preencha tudo");
  state.registros.push({ alunoId: l_aluno.value, data: l_data.value, obs: l_obs.value });
  
  // ESTACA ZERO - LIMPA TUDO
  l_obs.value = "";
  l_aluno.value = "";
  
  save();
  showToast();
};

r_aluno.onchange = () => {
  const alu = state.alunos.find(x => x.id === r_aluno.value);
  rel_corpo.innerHTML = `<strong>Aluno:</strong> ${alu?.nome} | <strong>Escola:</strong> ${alu?.escola}`;
  rel_tabela.innerHTML = "";
  state.registros.filter(r => r.alunoId === r_aluno.value).forEach(r => {
    rel_tabela.innerHTML += `<tr><td>${r.data}</td><td>${r.obs}</td></tr>`;
  });
};

imprimirBtn.onclick = () => window.print();

function showToast() {
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

load();
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoria Pro - Painel Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="auth-section" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-indigo-400">Monitoria Pro</h1>
                <p class="text-slate-400 text-sm mt-2">Gestão Inteligente para Monitoras</p>
            </div>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Seu e-mail" class="w-full p-4 rounded-2xl bg-slate-700 border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                <input id="password" type="password" placeholder="Sua senha" class="w-full p-4 rounded-2xl bg-slate-700 border-none focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg shadow-indigo-900/40">Entrar</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <nav class="no-print glass sticky top-0 z-50 border-b border-slate-700 p-4 mb-6">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h2 class="font-bold text-xl text-indigo-400">Painel Geral</h2>
                <div class="flex items-center gap-4">
                    <span id="user-display" class="hidden md:block text-xs text-slate-400"></span>
                    <button onclick="logout()" class="bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-900/30 text-red-400 transition-all">Sair</button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto p-4 space-y-6">
            
            <section class="no-print bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">👤 Novo Aluno</h3>
                <div class="flex flex-col md:flex-row gap-3">
                    <input id="nome-aluno" type="text" placeholder="Nome Completo" class="flex-1 p-3 rounded-xl bg-slate-900 border-none focus:ring-2 focus:ring-indigo-500">
                    <input id="escola-aluno" type="text" placeholder="Escola" class="flex-1 p-3 rounded-xl bg-slate-900 border-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="addAluno()" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-bold transition-all">Cadastrar</button>
                </div>
            </section>

            <div id="lista-alunos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </main>
    </div>

    <div id="print-area" class="hidden bg-white text-black p-10 min-h-screen"></div>

<script>
    const SUPABASE_URL = 'https://ujzevgunqiwclwybxvun.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_8Wi7CX3I7lih80KJxvalZA_eZStL97A';
    const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

    // CONTROLE DE ACESSO
    supabase.auth.onAuthStateChange((event, session) => {
        const authView = document.getElementById('auth-section');
        const appView = document.getElementById('app-section');
        
        if (session) {
            authView.classList.add('hidden');
            appView.classList.remove('hidden');
            document.getElementById('user-display').innerText = session.user.email;
            carregarAlunos();
        } else {
            authView.classList.remove('hidden');
            appView.classList.add('hidden');
        }
    });

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Erro: " + error.message);
    }

    async function logout() { await supabase.auth.signOut(); }

    // FUNÇÕES DE DADOS
    async function addAluno() {
        const nome = document.getElementById('nome-aluno').value;
        const escola = document.getElementById('escola-aluno').value;
        if (!nome) return alert("Digite o nome!");

        const { error } = await supabase.from('alunos').insert([{ nome, escola }]);
        if (error) alert(error.message);
        else {
            document.getElementById('nome-aluno').value = '';
            document.getElementById('escola-aluno').value = '';
            carregarAlunos();
        }
    }

    async function carregarAlunos() {
        const { data, error } = await supabase.from('alunos')
            .select('*')
            .eq('status', 'ativo')
            .order('nome');

        const container = document.getElementById('lista-alunos');
        container.innerHTML = data.map(aluno => `
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 hover:border-indigo-500/50 transition-all group">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h4 class="font-bold text-xl text-white">${aluno.nome}</h4>
                        <p class="text-sm text-slate-400">${aluno.escola || 'Escola não informada'}</p>
                    </div>
                    <button onclick="arquivarAluno('${aluno.id}')" class="text-slate-600 hover:text-red-400">🗑️</button>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="verDetalhes('${aluno.id}')" class="flex-1 bg-slate-700 hover:bg-indigo-600 text-xs py-2 rounded-lg font-bold transition-all">Ver Rotina</button>
                    <button onclick="gerarPDF('${aluno.id}')" class="bg-slate-700 hover:bg-emerald-600 px-3 py-2 rounded-lg text-xs transition-all">📄</button>
                </div>
            </div>
        `).join('');
    }

    async function arquivarAluno(id) {
        if(confirm("Deseja arquivar este aluno?")) {
            await supabase.from('alunos').update({ status: 'arquivado' }).eq('id', id);
            carregarAlunos();
        }
    }

    // O n8n poderá usar essa mesma estrutura de dados para suas automações!
</script>
</body>
</html>

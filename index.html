<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Monitoria Pro — MVP Profissional</title>
<style>
html,body{margin:0;height:100%;font-family:system-ui;background:#0f172a;color:#e2e8f0}
.app{max-width:1100px;margin:auto;padding:20px}
.nav{display:flex;gap:10px;margin-bottom:10px}
.nav button{flex:1;background:#1e293b;color:#fff;border:1px solid #334155;padding:10px;border-radius:10px}
.nav button.active{background:#22c55e;color:#022c22}
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:15px;box-shadow:0 6px 18px rgba(0,0,0,.3)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
label{font-size:13px;margin-top:8px;display:block;color:#94a3b8}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:#fff;margin-bottom:8px}
.small{max-width:120px}
.xsmall{max-width:90px}
button{background:#22c55e;color:#022c22;border:none;padding:10px;border-radius:10px;margin-top:10px;cursor:pointer}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.hidden{display:none}
.msg{position:fixed;top:20px;right:20px;background:#22c55e;color:#022c22;padding:10px;border-radius:10px;display:none}
.preview{width:48px;height:48px;background:#020617;border-radius:10px;overflow:hidden}
.preview img{width:100%;height:100%;object-fit:cover}
.lancamento-btn{width:60%;margin:10px auto;display:block;font-size:18px;padding:14px}
.lista-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:8px;border-radius:10px;background:#020617}
.lista-info{display:flex;gap:10px;align-items:center}
.actions button{margin-left:5px;padding:6px 8px}
.btn-delete{background:#334155;color:#e2e8f0}
.btn-edit{background:#334155;color:#e2e8f0}
</style>
</head>
<body>

<div id="msg" class="msg"></div>

<div id="loginScreen" class="center">
<form class="card" onsubmit="login(event)" style="width:340px;text-align:center">
<h3>🔐 Acesso</h3>
<input id="senha" type="password" placeholder="Digite a senha">
<button type="submit">Entrar</button>
</form>
</div>

<div id="app" class="hidden app">

<div class="nav">
<button onclick="aba('home',this)">🏠 Home</button>
<button onclick="aba('monitoria',this)">👩‍🏫 Monitoria</button>
</div>

<button class="lancamento-btn" onclick="novoLancamento()">+ Novo Lançamento</button>

<div class="nav">
<button onclick="aba('alunos',this)">📋 Alunos</button>
<button onclick="aba('cadastro',this)">➕ Cadastro</button>
<button onclick="aba('eventos',this)">📅 Eventos</button>
<button onclick="aba('lanc',this)">🧾 Lançamentos</button>
<button onclick="aba('rel',this)">📊 Relatório</button>
</div>

<!-- HOME -->
<div id="home" class="aba">
<div class="card">
<h3>📅 Avisos do dia</h3>
<ul id="avisos"></ul>
</div>
</div>

<!-- MONITORIA -->
<div id="monitoria" class="aba hidden">
<div class="card">
<label>Nome</label><input id="m_nome">
<label>Serviço</label><input id="m_servico">
<label>Telefone</label><input id="m_tel">
<label>Email</label><input id="m_email">
<button onclick="salvarMonitora()">Salvar</button>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="aba hidden">
<div class="card" style="max-width:720px;margin:auto">
<h3 style="margin-bottom:18px;text-align:center">Cadastro do Aluno</h3>

<!-- FOTO -->
<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:18px">
<label>Foto do aluno</label>
<input type="file" onchange="img(this)" style="max-width:220px">
<div class="preview" id="prev" style="margin-top:10px;width:56px;height:56px"></div>
</div>

<!-- FORM LIMPO E ALINHADO -->
<div style="display:flex;flex-direction:column;gap:12px">

<label>Nome do aluno</label>
<input id="nome">

<!-- LINHA: DATA + SERIE + TURMA -->
<div style="display:flex;gap:12px;align-items:flex-end">
<div style="width:160px">
<label>Data de nascimento</label>
<input type="date" id="nasc" style="width:100%">
</div>

<div style="width:80px">
<label>Série</label>
<input id="serie">
</div>

<div style="width:80px">
<label>Turma</label>
<input id="turma">
</div>
</div>

<label>Escola</label>
<input id="escola">

<label>Responsável</label>
<input id="resp">

<!-- HORÁRIOS MAIS COMPACTOS -->
<div style="display:flex;gap:12px">
<div style="flex:1">
<label>Horário de entrada</label>
<input type="time" id="h1" value="08:00">
</div>

<div style="flex:1">
<label>Horário de saída</label>
<input type="time" id="h2" value="12:00">
</div>
</div>

<!-- OBSERVAÇÕES AJUSTADO -->
<div style="display:flex;flex-direction:column;align-items:center;margin-top:6px">
<label style="align-self:flex-start">Observações Gerais</label>
<textarea id="obsAluno" style="height:70px;width:100%;max-width:620px"></textarea>
</div>

<button onclick="salvarAluno()">Salvar</button>

</div>
</div>
</div>

<!-- ALUNOS -->
<div id="alunos" class="aba hidden"><div class="card" id="lista"></div></div>

<!-- EVENTOS -->
<div id="eventos" class="aba hidden">
<div class="card">
<label>Título</label><input id="evT">
<label>Data</label><input type="date" id="evD">
<label>Descrição</label><textarea id="evDesc"></textarea>
<button onclick="salvarEvento()">Salvar</button>
<div id="listaEventos"></div>
</div>
</div>

<!-- LANÇAMENTOS -->
<div id="lanc" class="aba hidden">
<div class="card hidden" id="formLanc">
<select id="lAluno"></select>
<input type="date" id="lData">
<input type="time" id="lHora">
<textarea id="lObs" placeholder="Observações"></textarea>
<button onclick="salvarLanc()">Salvar</button>
</div>
<div class="card" id="listaLanc"></div>
</div>

<!-- RELATORIO -->
<div id="rel" class="aba hidden">
<div class="card">
<select id="relAluno"></select>
<button onclick="gerarRel()">Gerar</button>
<button onclick="window.print()">Exportar PDF</button>
<pre id="saida"></pre>
</div>
</div>

</div>

<script>
const SENHA='acesso123'
const get=k=>JSON.parse(localStorage.getItem(k)||'[]')
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v))
let foto=''
let editIndex=null

function msg(t){msgBox.innerText=t;msgBox.style.display='block';setTimeout(()=>msgBox.style.display='none',2000)}
const msgBox=document.getElementById('msg')

function login(e){e.preventDefault();if(document.getElementById('senha').value===SENHA){loginScreen.style.display='none';app.classList.remove('hidden');carregar()}}

function aba(id,btn){document.querySelectorAll('.aba').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active')}

function img(i){let f=i.files[0];let r=new FileReader();r.onload=e=>{foto=e.target.result;prev.innerHTML='<img src="'+foto+'">'};r.readAsDataURL(f)}

function salvarMonitora(){set('monitora',{nome:m_nome.value,servico:m_servico.value,tel:m_tel.value,email:m_email.value});msg('Salvo com sucesso!')}

function salvarAluno(){
let a=get('alunos');

if(editIndex!==null){
 a[editIndex]={nome:nome.value,nasc:nasc.value,escola:escola.value,foto};
 editIndex=null;
}else{
 a.push({nome:nome.value,nasc:nasc.value,escola:escola.value,foto});
}

set('alunos',a);
msg('Salvo com sucesso!');
resetAluno();
carregar();
aba('alunos')
}

function resetAluno(){nome.value='';nasc.value='';escola.value='';resp.value='';serie.value='';turma.value='';h1.value='08:00';h2.value='12:00';prev.innerHTML='';foto=''}

function salvarEvento(){let e=get('eventos');e.push({t:evT.value,d:evD.value});set('eventos',e);msg('Salvo com sucesso!');evT.value='';evD.value='';evDesc.value='';carregar()}

function novoLancamento(){aba('lanc');formLanc.classList.remove('hidden')}

function salvarLanc(){let l=get('lanc');l.push({aluno:lAluno.value,data:lData.value,hora:lHora.value,obs:lObs.value});set('lanc',l);msg('Salvo com sucesso!');lObs.value='';formLanc.classList.add('hidden');carregar()}

function deletarAluno(i){
let a=get('alunos');
a.splice(i,1);
set('alunos',a);
msg('Excluído com sucesso!');
carregar()
}

function editarAluno(i){
let a=get('alunos');
let al=a[i];

nome.value=al.nome||'';
nasc.value=al.nasc||'';
escola.value=al.escola||'';

if(al.foto){
 foto=al.foto;
 prev.innerHTML='<img src="'+foto+'">';
}

editIndex=i;
aba('cadastro');
}

function carregar(){
let a=get('alunos'),l=get('lanc'),e=get('eventos')
lista.innerHTML='';relAluno.innerHTML='';lAluno.innerHTML='';listaEventos.innerHTML='';listaLanc.innerHTML='';avisos.innerHTML=''

 a.forEach((x,i)=>{
 let idade='-';if(x.nasc){let n=new Date(x.nasc);idade=new Date().getFullYear()-n.getFullYear()}
 lista.innerHTML+=`<div class='lista-item'><div class='lista-info'><div class='preview'>${x.foto?`<img src='${x.foto}'>`:''}</div><div>${x.nome}<br>${idade} anos</div></div><div class='actions'>
<button class='btn-edit' onclick='editarAluno(${i})'>✏️</button>
<button class='btn-delete' onclick='deletarAluno(${i})'>🗑️</button>
</div></div>`
 relAluno.innerHTML+=`<option value=${i}>${x.nome}</option>`
 lAluno.innerHTML+=`<option value=${i}>${x.nome}</option>`
 })

 e.forEach(x=>{
 listaEventos.innerHTML+=`<div>${x.d} - ${x.t}</div>`
 if(x.d===new Date().toISOString().slice(0,10)) avisos.innerHTML+=`<li>${x.t}</li>`
 })

 l.forEach(x=>listaLanc.innerHTML+=`<div>${x.data} ${x.hora} - ${x.obs}</div>`)
}

function gerarRel(){let a=get('alunos');let i=relAluno.value;if(!a[i])return;saida.innerText=`RELATÓRIO\nAluno:${a[i].nome}\nEscola:${a[i].escola}\nGerado em:${new Date().toLocaleDateString()}`}
</script>

</body>
</html>
